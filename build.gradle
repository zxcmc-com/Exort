import com.github.spotbugs.snom.Confidence
import com.github.spotbugs.snom.Effort

plugins {
    id 'java'
    id 'com.gradleup.shadow' version '9.5.1'
    id 'com.github.spotbugs' version '6.5.8'
}

group = 'com.zxcmc.exort'
version = '0.19.7'
description = 'Exort Storage Network'

def pluginVersion = version.toString()
def pluginDescription = description
def defaultPaperApiVersion = '26.1.2.build.59-stable'
def sparkApiVersion = '0.1-20240720.200737-2'
def paperApiVersionOverride = providers.gradleProperty('paperApiVersion')
def paperApiVersion = paperApiVersionOverride.orElse(defaultPaperApiVersion).get()

base {
    archivesName = 'Exort'
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

spotbugs {
    toolVersion = '4.10.2'
    effort = Effort.valueOf('MAX')
    reportLevel = Confidence.valueOf('HIGH')
    ignoreFailures = false
    showProgress = false
    maxHeapSize = '1g'
}

tasks.named('spotbugsTest') {
    enabled = false
}

tasks.named('spotbugsMain') {
    reports {
        xml.required = true
        html.required = true
    }
}

repositories {
    mavenCentral()

    exclusiveContent {
        forRepository {
            maven {
                name = 'PaperMC'
                url = 'https://repo.papermc.io/repository/maven-public/'
            }
        }
        filter {
            includeGroup 'io.papermc.paper'
            includeGroup 'com.mojang'
            includeGroup 'net.md-5'
            includeModule 'me.lucko', 'spark-api'
        }
    }

    exclusiveContent {
        forRepository {
            maven {
                name = 'CodeMC'
                url = 'https://repo.codemc.io/repository/maven-releases/'
            }
        }
        filter {
            includeGroup 'com.github.retrooper'
        }
    }

    exclusiveContent {
        forRepository {
            maven {
                name = 'EngineHub'
                url = 'https://maven.enginehub.org/repo/'
            }
        }
        filter {
            includeGroupByRegex 'com\\.sk89q(\\..*)?'
            includeGroupByRegex 'org\\.enginehub(\\..*)?'
        }
    }

    exclusiveContent {
        forRepository {
            maven {
                name = 'JitPack'
                url = 'https://jitpack.io'
            }
        }
        filter {
            includeGroup 'com.github.GriefPrevention'
            includeGroup 'com.github.Zrips'
        }
    }

    exclusiveContent {
        forRepository {
            maven {
                name = 'Towny'
                url = 'https://repo.glaremasters.me/repository/towny/'
            }
        }
        filter {
            includeGroup 'com.palmergames.bukkit.towny'
        }
    }

    exclusiveContent {
        forRepository {
            maven {
                name = 'IncrediblePlugins'
                url = 'https://repo.incredibleplugins.com/releases/'
            }
        }
        filter {
            includeGroup 'com.incredibleplugins'
        }
    }

    exclusiveContent {
        forRepository {
            maven {
                name = 'Oraxen'
                url = 'https://repo.oraxen.com/releases/'
            }
        }
        filter {
            includeGroup 'io.th0rgal'
        }
    }

    exclusiveContent {
        forRepository {
            maven {
                name = 'Nexo'
                url = 'https://repo.nexomc.com/releases/'
            }
        }
        filter {
            includeGroup 'com.nexomc'
            includeGroup 'team.unnamed'
        }
    }
}

configurations {
    googleJavaFormat
}

configurations.configureEach {
    if (canBeResolved) {
        attributes.attribute(org.gradle.api.attributes.java.TargetJvmVersion.TARGET_JVM_VERSION_ATTRIBUTE, 25)
    }
    if (paperApiVersionOverride.isPresent()) {
        resolutionStrategy.deactivateDependencyLocking()
    }
}

dependencyLocking {
    if (!paperApiVersionOverride.isPresent()) {
        lockAllConfigurations()
        ignoredDependencies.add('org.enginehub.lin-bus:lin-bus-bom')
        ignoredDependencies.add('org.enginehub.lin-bus:lin-bus-common')
        ignoredDependencies.add('org.enginehub.lin-bus:lin-bus-stream')
        ignoredDependencies.add('org.enginehub.lin-bus:lin-bus-tree')
        ignoredDependencies.add('org.enginehub.lin-bus.format:lin-bus-format-snbt')
        // Gradle canonicalizes this pinned unique snapshot back to 0.1-SNAPSHOT in lock state.
        ignoredDependencies.add('me.lucko:spark-api')
    }
}

dependencies {
    compileOnly "io.papermc.paper:paper-api:${paperApiVersion}"
    compileOnly "me.lucko:spark-api:${sparkApiVersion}"
    compileOnly 'org.xerial:sqlite-jdbc:3.45.3.0'
    compileOnly 'com.sk89q.worldedit:worldedit-core:7.3.0'
    compileOnly('com.sk89q.worldguard:worldguard-bukkit:7.0.17') { transitive = false }
    compileOnly('com.github.GriefPrevention:GriefPrevention:18.0.0') { transitive = false }
    compileOnly('com.palmergames.bukkit.towny:towny:0.103.0.2') { transitive = false }
    compileOnly('com.incredibleplugins:lands-api:7.25.14') { transitive = false }
    compileOnly('com.github.Zrips:Residence:6.0.0.1') { transitive = false }
    compileOnly 'com.github.retrooper:packetevents-spigot:2.12.2'
    compileOnly('io.th0rgal:oraxen:1.217.0') { transitive = false }
    compileOnly('com.nexomc:nexo:1.24.0') { transitive = false }
    compileOnly('team.unnamed:creative-api:1.13.14') { transitive = false }
    implementation 'org.bstats:bstats-bukkit:3.1.0'
    implementation 'org.bstats:bstats-base:3.1.0'
    testImplementation platform('org.junit:junit-bom:5.11.4')
    testImplementation 'org.junit.jupiter:junit-jupiter'
    testImplementation "me.lucko:spark-api:${sparkApiVersion}"
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
    testImplementation "io.papermc.paper:paper-api:${paperApiVersion}"
    testImplementation 'com.sk89q.worldedit:worldedit-core:7.3.0'
    testRuntimeOnly 'org.xerial:sqlite-jdbc:3.45.3.0'
    googleJavaFormat 'com.google.googlejavaformat:google-java-format:1.35.0'
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8'
    options.release = 21
    options.compilerArgs += [
        "-Xlint:deprecation",
        "-Xlint:unchecked"
    ]
}

tasks.register('googleJavaFormat', JavaExec) {
    group = 'formatting'
    description = 'Formats Java sources using google-java-format.'
    classpath = configurations.googleJavaFormat
    mainClass = 'com.google.googlejavaformat.java.Main'
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(25)
    }
    jvmArgs(
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED'
    )
    args '--replace'
    args fileTree('src') {
        include 'main/java/**/*.java'
        include 'test/java/**/*.java'
        exclude '**/CreativeTabData.java'
    }.files
}

tasks.register('googleJavaFormatCheck', JavaExec) {
    group = 'verification'
    description = 'Checks Java source formatting using google-java-format without rewriting files.'
    classpath = configurations.googleJavaFormat
    mainClass = 'com.google.googlejavaformat.java.Main'
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(25)
    }
    jvmArgs(
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.api=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.code=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.file=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.parser=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.tree=ALL-UNNAMED',
        '--add-exports', 'jdk.compiler/com.sun.tools.javac.util=ALL-UNNAMED'
    )
    args '--dry-run'
    args '--set-exit-if-changed'
    args fileTree('src') {
        include 'main/java/**/*.java'
        include 'test/java/**/*.java'
        exclude '**/CreativeTabData.java'
    }.files
}

tasks.register('exportResourcePack', JavaExec) {
    group = 'build'
    description = 'Exports the standalone Exort resource pack to build/exort-resource-pack.'
    dependsOn tasks.named('classes')
    classpath = sourceSets.main.runtimeClasspath + sourceSets.main.compileClasspath
    mainClass = 'com.zxcmc.exort.infra.resourcepack.export.ResourcePackCli'
    javaLauncher = javaToolchains.launcherFor {
        languageVersion = JavaLanguageVersion.of(25)
    }
    args file('src/main/resources').absolutePath
    args layout.buildDirectory.dir('exort-resource-pack').get().asFile.absolutePath
    args 'true'
    inputs.dir file('src/main/resources/pack')
    inputs.dir file('src/main/resources/lang')
    outputs.file layout.buildDirectory.file('exort-resource-pack/exort.zip')
}

tasks.withType(JavaCompile).configureEach {
    // Artifact-producing Gradle entrypoints rely on this auto-format gate.
    dependsOn tasks.named('googleJavaFormat')
}

tasks.named('googleJavaFormatCheck') {
    mustRunAfter tasks.named('googleJavaFormat')
}

tasks.named('check') {
    dependsOn tasks.named('googleJavaFormatCheck')
}

tasks.named('test') {
    useJUnitPlatform()
    jvmArgs '--enable-native-access=ALL-UNNAMED'
}

tasks.named('shadowJar') {
    archiveClassifier.set('')
    includeEmptyDirs = false
    configurations = [project.configurations.runtimeClasspath]
    dependencies {
        include(dependency('org.bstats:bstats-bukkit:3.1.0'))
        include(dependency('org.bstats:bstats-base:3.1.0'))
    }
    relocate 'org.bstats', 'com.zxcmc.exort.libs.bstats'
}

tasks.named('jar') {
    enabled = false
}

tasks.named('build') {
    dependsOn tasks.named('verifyPluginJar')
}

tasks.processResources {
    includeEmptyDirs = false
    filteringCharset = 'UTF-8'
    inputs.property('version', pluginVersion)
    inputs.property('description', pluginDescription)
    filesMatching(['plugin.yml', 'paper-plugin.yml']) {
        expand(
            version: pluginVersion,
            description: pluginDescription
        )
    }
}

def pluginJar = tasks.named('shadowJar').flatMap { it.archiveFile }

tasks.register('verifyPluginJar') {
    group = 'verification'
    description = 'Verifies the deployable plugin JAR structure, bytecode level, and bStats relocation.'
    dependsOn tasks.named('shadowJar')
    inputs.file(pluginJar)

    doLast {
        def jarFile = pluginJar.get().asFile
        if (!jarFile.isFile() || jarFile.length() == 0L) {
            throw new GradleException("Plugin JAR is missing or empty: ${jarFile}")
        }

        def expectedBstatsClasses = [
            'com/zxcmc/exort/libs/bstats/MetricsBase.class',
            'com/zxcmc/exort/libs/bstats/bukkit/Metrics.class',
            'com/zxcmc/exort/libs/bstats/charts/AdvancedBarChart.class',
            'com/zxcmc/exort/libs/bstats/charts/AdvancedPie.class',
            'com/zxcmc/exort/libs/bstats/charts/CustomChart.class',
            'com/zxcmc/exort/libs/bstats/charts/DrilldownPie.class',
            'com/zxcmc/exort/libs/bstats/charts/MultiLineChart.class',
            'com/zxcmc/exort/libs/bstats/charts/SimpleBarChart.class',
            'com/zxcmc/exort/libs/bstats/charts/SimplePie.class',
            'com/zxcmc/exort/libs/bstats/charts/SingleLineChart.class',
            'com/zxcmc/exort/libs/bstats/config/MetricsConfig.class',
            'com/zxcmc/exort/libs/bstats/json/JsonObjectBuilder.class',
            'com/zxcmc/exort/libs/bstats/json/JsonObjectBuilder$1.class',
            'com/zxcmc/exort/libs/bstats/json/JsonObjectBuilder$JsonObject.class'
        ] as Set
        def allowedRootFiles = [
            'config.yml', 'paper-plugin.yml', 'recipes.yml', 'storage-tiers.yml'
        ] as Set
        def allowedDirectoryEntries = ['com/', 'com/zxcmc/'] as Set
        def allowedPrefixes = [
            'META-INF/', 'com/zxcmc/exort/', 'lang/', 'pack/'
        ]

        new java.util.zip.ZipFile(jarFile).withCloseable { zip ->
            def entries = zip.entries().toList()
            def entryNames = entries.collect { it.name }
            if (entryNames.isEmpty()) {
                throw new GradleException("Plugin JAR has no entries: ${jarFile}")
            }
            if (entryNames.toSet().size() != entryNames.size()) {
                throw new GradleException("Plugin JAR contains duplicate ZIP entries: ${jarFile}")
            }

            ['paper-plugin.yml', 'com/zxcmc/exort/core/ExortPlugin.class'].each { required ->
                if (!entryNames.contains(required)) {
                    throw new GradleException("Plugin JAR is missing required entry: ${required}")
                }
            }

            def descriptor = zip.getInputStream(zip.getEntry('paper-plugin.yml')).getText('UTF-8')
            if (descriptor.contains('${version}') || descriptor.contains('${description}')) {
                throw new GradleException('paper-plugin.yml still contains unexpanded build placeholders')
            }
            if (!descriptor.contains('main: com.zxcmc.exort.core.ExortPlugin')) {
                throw new GradleException('paper-plugin.yml does not declare the expected main class')
            }
            if (!descriptor.contains("version: \"${pluginVersion}\"")) {
                throw new GradleException(
                    "paper-plugin.yml does not contain the expected version ${pluginVersion}"
                )
            }

            def mainClassEntry = zip.getEntry('com/zxcmc/exort/core/ExortPlugin.class')
            zip.getInputStream(mainClassEntry).withCloseable { classStream ->
                def classHeader = new DataInputStream(classStream)
                if (Integer.toUnsignedLong(classHeader.readInt()) != 0xCAFEBABEL) {
                    throw new GradleException('ExortPlugin.class has an invalid class-file header')
                }
                classHeader.readUnsignedShort()
                def majorVersion = classHeader.readUnsignedShort()
                if (majorVersion != 65) {
                    throw new GradleException(
                        "Expected Java 21 class-file version 65, found ${majorVersion}"
                    )
                }
            }

            def actualBstatsClasses = entryNames.findAll {
                it.startsWith('com/zxcmc/exort/libs/bstats/') && it.endsWith('.class')
            } as Set
            if (actualBstatsClasses != expectedBstatsClasses) {
                def missing = expectedBstatsClasses - actualBstatsClasses
                def unexpected = actualBstatsClasses - expectedBstatsClasses
                throw new GradleException(
                    "Unexpected relocated bStats class set; missing=${missing}, unexpected=${unexpected}"
                )
            }
            if (entryNames.any { it.startsWith('org/bstats/') }) {
                throw new GradleException('Plugin JAR contains unrelocated org.bstats classes')
            }
            if (entryNames.any { it.startsWith('me/lucko/spark/') }) {
                throw new GradleException('Plugin JAR must not bundle compile-only spark API classes')
            }

            def unexpectedEntry = entryNames.find { name ->
                def allowedPath = allowedRootFiles.contains(name) ||
                    allowedDirectoryEntries.contains(name) ||
                    allowedPrefixes.any { name.startsWith(it) }
                !allowedPath || name.endsWith('.java')
            }
            if (unexpectedEntry != null) {
                throw new GradleException(
                    "Plugin JAR contains an entry outside the artifact allowlist: ${unexpectedEntry}"
                )
            }
        }
    }
}
