  relay_waiting: "ಮೊದಲ ನೆಟ್‌ವರ್ಕ್ ರಿಲೇ ಆಯ್ಕೆಯಾಗಿದೆ. ಎರಡನೇ ನೆಟ್‌ವರ್ಕ್ ರಿಲೇ ಮೇಲೆ ರೈಟ್-ಕ್ಲಿಕ್ ಮಾಡಿ."
