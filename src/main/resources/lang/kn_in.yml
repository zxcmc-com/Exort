  relay_cross_world: "ನೆಟ್‌ವರ್ಕ್ ರಿಲೇಗಳನ್ನು ವಿಭಿನ್ನ worlds ನಡುವೆ ಲಿಂಕ್ ಮಾಡಲಾಗುವುದಿಲ್ಲ."
  relay_already_linked: "ಈ ನೆಟ್‌ವರ್ಕ್ ರಿಲೇಗಳಲ್ಲಿ ಒಂದನ್ನು ಈಗಾಗಲೇ ಲಿಂಕ್ ಮಾಡಲಾಗಿದೆ."
  relay_out_of_range: "ನೆಟ್‌ವರ್ಕ್ ರಿಲೇಗಳು ತುಂಬಾ ದೂರದಲ್ಲಿವೆ. ಮಿತಿ: Manhattan ದೂರದ ಪ್ರಕಾರ {0} chunks."
  relay_linked: "ನೆಟ್‌ವರ್ಕ್ ರಿಲೇಗಳು ಲಿಂಕ್ ಆಗಿವೆ."
  relay_unlinked: "ನೆಟ್‌ವರ್ಕ್ ರಿಲೇ ಲಿಂಕ್ ತೆಗೆದುಹಾಕಲಾಗಿದೆ."
