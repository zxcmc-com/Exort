message:
  no_permission: "அனுமதி இல்லை."
  no_storage_adjacent: "அருகில் சேமிப்பு பிளாக் இல்லை."
  multiple_storages_adjacent: "பல சேமிப்புகள் இணைக்கப்பட்டுள்ளன. ஒன்றை மட்டும் விடுங்கள்."
  storage_missing_id: "சேமிப்பு பிளாக்கில் id இல்லை."
  storage_load_failed: "சேமிப்பை ஏற்ற முடியவில்லை. கன்சோலைப் பார்க்கவும்."
  storage_loading: "சேமிப்பு ஏற்றப்படுகிறது. சிறிது நேரத்தில் மீண்டும் முயலுங்கள்."
  operation_failed: "செயல் தோல்வியடைந்தது. கன்சோலைப் பார்க்கவும்."
  relay_waiting: "முதல் நெட்வொர்க் ரிலே தேர்ந்தெடுக்கப்பட்டது. இரண்டாவது நெட்வொர்க் ரிலே மீது வலது கிளிக் செய்யவும்."
  relay_same: "நெட்வொர்க் ரிலே தன்னுடன் தானே இணைக்க முடியாது."
  relay_cross_world: "நெட்வொர்க் ரிலேகளை வேறு உலகங்களுக்கு இடையில் இணைக்க முடியாது."
  relay_already_linked: "இந்த நெட்வொர்க் ரிலேகளில் ஒன்று ஏற்கனவே இணைக்கப்பட்டுள்ளது."
  relay_out_of_range: "நெட்வொர்க் ரிலேகள் மிகவும் தூரமாக உள்ளன. வரம்பு: Manhattan தூரப்படி {0} chunks."
  relay_linked: "நெட்வொர்க் ரிலேகள் இணைக்கப்பட்டன."
  relay_unlinked: "நெட்வொர்க் ரிலே இணைப்பு நீக்கப்பட்டது."
  relay_disabled: "நெட்வொர்க் ரிலேகள் சர்வர் கான்ஃபிகரேஷனால் முடக்கப்பட்டுள்ளன."
  chunk_loader_duplicate: "இந்த சங்க் லோடர் ஏற்கனவே வேறு இடத்தில் செயல்பாட்டில் உள்ளது."
  chunk_loader_feature_disabled: "சங்க் லோடர்கள் சர்வர் கான்ஃபிகரேஷனால் முடக்கப்பட்டுள்ளன."
  chunk_loader_initializing: "சங்க் லோடர்கள் இன்னும் தொடங்கிக்கொண்டிருக்கின்றன. சிறிது நேரம் கழித்து மீண்டும் முயலவும்."
  chunk_loader_limit_reached: "சங்க் லோடர் வரம்பு எட்டப்பட்டது. வரம்புகளைச் சரிபார்க்க ஒரு சர்வர் நிர்வாகியைக் கேட்கவும்."
