# Server text language. Use a code from assets/minecraft/lang/<code>.json, such as en_us or ru_ru.
# A local plugins/Exort/lang/<code>.yml file overrides bundled Exort text for that locale; missing keys fall back to bundled data and then en_us.
language: en_us

# Global visual mode.
# VANILLA works without a resource pack. RESOURCE uses Exort's resource-pack models.
mode: RESOURCE

# Check GitHub for a newer Exort version on startup. Network failures are ignored.
updateCheck: true

# Built-in Exort-only chorus handling for RESOURCE wires that use CHORUS_PLANT.
# If the external Chorusfix plugin is enabled, Exort delegates to it without changing this value.
chorusfix: true

# Resource pack delivery is used only when the effective mode is RESOURCE.
resourcePack:
  # AUTO | EXORT | NEXO | ITEMSADDER | ORAXEN | SELFHOST | LOBFILE | DISABLED.
  # AUTO uses an enabled pack provider or configured official EXORT hosting; it never opens the
  # built-in HTTP server. Select SELFHOST explicitly to start the built-in server.
  hosting: AUTO
  # AUTO | CONFIGURATION | JOIN | MANUAL
  delivery: AUTO
  # Seconds to wait for a CONFIGURATION-stage pack response before allowing the player to join.
  # Values outside 1..300 are clamped with a warning.
  configurationTimeoutSeconds: 30
  # If true, Exort sends a newly ready direct-delivery pack to players who are already online.
  sendOnlineOnReady: false
  # MiniMessage prompt shown by the client.
  prompt: "<gray>Accept the Exort resource pack."
  selfHost:
    # Public URL visible to players. Empty means Exort tries to infer it from the server address.
    publicUrl: ""
    # HTTP bind host for SELFHOST mode.
    bindHost: "0.0.0.0"
    # 0 lets the OS pick a free port; values outside 0..65535 are clamped with a warning.
    port: 0
  lobfile:
    # API key for LOBFILE hosting. Keep empty unless hosting is set to LOBFILE.
    apiKey: ""

# Optional PacketEvents integration. Exort remains usable without PacketEvents installed.
packetEvents:
  enabled: true
  # SIMPLE rewrites Exort item name/lore packets in VANILLA mode.
  # FULL also rewrites Exort display entity names/item metadata when PacketEvents is available.
  # RESOURCE mode uses resource-pack translation keys instead.
  # SIMPLE | FULL
  localizationLevel: SIMPLE

# Optional integration controls. Exort never edits another plugin's config unless explicitly opted in.
integrations:
  fawe:
    # Add Exort/provider extents to FastAsyncWorldEdit's extent.allowed-plugins automatically.
    # Leave false to receive an actionable diagnostic and manage the FAWE allowlist yourself.
    autoConfigure: false

# Runtime performance controls that may need server-specific tuning.
performance:
  displayCulling:
    # Dynamically lowers Exort display render ranges per player in dense scenes.
    enabled: true
    # AUTO | PACKET_EVENTS | PAPER. AUTO prefers PacketEvents metadata packets when available.
    backend: AUTO
    clientCullingBypass:
      # Stores and applies per-player bypass for clients with a client-side culling mod such as EntityCulling.
      enabled: true
      # Attempts automatic EntityCulling detection with a translation probe for modded clients.
      translationProbe: true
  # Budget Exort marker/display/bus/network post-processing after WorldEdit/FAWE operations.
  worldEditBulk: true
  storage:
    # Seconds between periodic dirty-cache flushes to the database. Set 0 to disable the periodic flush.
    # Values outside 0..86400 are clamped with a warning.
    flushIntervalSeconds: 10
    # Seconds before an idle storage cache can be unloaded from memory. Set 0 to disable idle unloads.
    # Values outside 0..86400 are clamped with a warning.
    idleUnloadSeconds: 300
    # Seconds between idle-cache checks.
    # Values outside 0..86400 are clamped with a warning.
    idleCheckSeconds: 60
  # Ticks between physical terminal/bus GUI distance checks. Values outside 1..1200 are clamped.
  sessionDeviceCheckIntervalTicks: 5
  bus:
    # Global bus operation budget per tick. Values above 4096 are clamped.
    maxOperationsPerTick: 500
    # Per-chunk bus operation budget per tick. Set 0 for no per-chunk limit;
    # values above the global budget are clamped to that budget.
    maxOperationsPerChunk: 40

# Prevent client-side ghost placement and sounds when right-clicking Exort blocks with placeable items.
placementGuard: true

# Region/claim protection integrations.
protection:
  enabled: true
  # If an installed protection adapter cannot complete a check, true denies Exort actions.
  # Keep this fail-closed unless compatibility debugging explicitly requires otherwise.
  failClosedOnError: true
  adapters:
    worldguard: true
    griefPrevention: true
    towny: true
    lands: true
    residence: true

# Register Exort crafting recipes from recipes.yml.
recipes:
  enabled: true

# Default sort mode for terminals: AMOUNT | NAME | ID | CATEGORY.
defaultSortMode: AMOUNT

# Import/export bus gameplay settings.
bus:
  # Default modes for newly placed buses: DISABLED | WHITELIST | BLACKLIST | ALL.
  defaultMode:
    import: WHITELIST
    export: WHITELIST
  # Allow buses to interact with Exort storages directly.
  allowStorageTargets: true
  # Ticks between bus runs after a successful item move. Values outside 1..72000 are clamped.
  activeIntervalTicks: 5
  # Ticks between bus runs while idle. Values outside 1..72000 are clamped.
  idleIntervalTicks: 40
  # Max items moved per bus operation. Values outside 1..64 are clamped.
  itemsPerOperation: 1

# Wire traversal limits.
wire:
  # CHORUS_PLANT | BARRIER.
  # CHORUS_PLANT uses chorus carriers when Paper chorus-plant updates are disabled,
  # and safely falls back to BARRIER otherwise. BARRIER always uses full-block wire hitboxes.
  carrier: CHORUS_PLANT
  # Maximum logical wire length used to connect a terminal to storage.
  # Values are clamped to 1..32768 to keep traversal work bounded.
  limit: 32
  # Hard traversal cap. If exceeded, the network is ignored.
  # Values are clamped to wire.limit..65536.
  hardCap: 64

# Network Relay settings.
relay:
  # Enable Network Relay placement, interaction, recipes, catalog visibility, and network traversal.
  enabled: true
  # Maximum chunk Manhattan distance between two linked network relay blocks.
  # Values outside 0..1024 are clamped by Exort.
  rangeChunks: 3

# Chunk Loader settings.
chunkLoader:
  # Enable Chunk Loader placement, interaction, recipes, catalog visibility, and plugin chunk tickets.
  enabled: true
  # Square radius in chunks around the loader. 1 keeps 3x3 chunks loaded.
  # Values outside 0..8 are clamped by Exort.
  radius: 1
  # Operational limits protect the server from accidentally ticketing excessive chunks.
  # Values outside Exort's safe ranges are clamped with a startup warning.
  limits:
    maxActiveLoaders: 128
    maxActiveLoadersPerWorld: 64
    maxActiveLoadersPerPlayer: 8
    maxUniqueChunks: 2048
    maxUniqueChunksPerWorld: 1024
  audit:
    # Disable the whole Chunk Loader audit pipeline, including console logs, file logs, inventory
    # tracking, creative-session reconciliation, and related item-loss event listeners.
    enabled: true
    file:
      enabled: true
      path: logs/chunkloaders.log
      # Clamped to 1..67108864 bytes and 1..32 archives.
      maxSizeBytes: 10485760
      maxFiles: 10
    # Console event filters only. The dedicated file audit remains full while file.enabled is true.
    events:
      issue: true
      duplicate: true
      craft: true
      inventoryMove: true
      drop: true
      pickup: true
      place: true
      break: true
      enable: true
      disable: true
      ticketAcquire: false
      ticketRelease: false
      destroy: true
      cleanup: true

# Wireless terminal settings.
wireless:
  enabled: true
  # Horizontal range in blocks from loaded active Wireless Transmitters.
  # Values outside 0..32768 are clamped by Exort.
  rangeBlocks: 48
  boosters:
    # Final finite non-negative range multipliers relative to rangeBlocks. Exactly -1 makes a
    # loaded transmitter global inside its current world without loading its chunk.
    rangeMultipliers:
      rare: 1.5
      mythical: 2.0
      legendary: 6.0
      immortal: -1.0

# Custom breaking for Exort carrier blocks.
# Hardness controls break speed; higher is slower. Values must be finite and non-negative.
# Blast resistance controls Exort-side explosion destruction; values must be finite and non-negative.
# Vanilla carrier resistance is ignored.
# Tools only speed breaking up, they do not restrict who can break the block.
break:
  storage:
    hardness: 20.0
    blastResistance: 1200.0
    tools:
      - pickaxe
  terminal:
    hardness: 12.0
    blastResistance: 9.0
    tools:
      - pickaxe
      - axe
  monitor:
    hardness: 12.0
    blastResistance: 9.0
    tools:
      - pickaxe
      - axe
  bus:
    hardness: 14.0
    blastResistance: 10.0
    tools:
      - pickaxe
      - axe
  relay:
    hardness: 16.0
    blastResistance: 50.0
    tools:
      - pickaxe
      - axe
  transmitter:
    hardness: 16.0
    blastResistance: 50.0
    tools:
      - pickaxe
      - axe
  chunkLoader:
    hardness: 16.0
    blastResistance: 50.0
    tools:
      - pickaxe
      - axe
  wire:
    hardness: 2.0
    blastResistance: 6.0
    tools:
      - pickaxe
      - axe
      - sword
