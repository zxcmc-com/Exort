# Server text language. Use a code from assets/minecraft/lang/<code>.json, such as en_us or ru_ru.
# A local plugins/Exort/lang/<code>.yml file overrides bundled Exort text for that locale; missing keys fall back to bundled data and then en_us.
language: en_us

# Global visual mode.
# VANILLA works without a resource pack. RESOURCE uses Exort's resource-pack models.
mode: RESOURCE

# Check GitHub for a newer Exort version on startup. Network failures are ignored.
updateCheck: true

# Resource pack delivery is used only when the effective mode is RESOURCE.
resourcePack:
  # AUTO | EXORT | NEXO | ITEMSADDER | SELFHOST | LOBFILE | DISABLED
  hosting: AUTO
  # AUTO | CONFIGURATION | JOIN | MANUAL
  delivery: AUTO
  # Seconds to wait for a CONFIGURATION-stage pack response before allowing the player to join.
  configurationTimeoutSeconds: 30
  # If true, Exort sends a newly ready direct-delivery pack to players who are already online.
  sendOnlineOnReady: false
  # MiniMessage prompt shown by the client.
  prompt: "<gray>Accept the Exort resource pack."
  selfHost:
    # Public URL visible to players. Empty means Exort tries to infer it from the server address.
    publicUrl: ""
    # HTTP bind host for SELFHOST mode.
    bindHost: "0.0.0.0"
    # 0 lets the OS pick a free port.
    port: 0
  lobfile:
    # API key for LOBFILE hosting. Keep empty unless hosting is set to LOBFILE.
    apiKey: ""

# Optional PacketEvents integration. Exort remains usable without PacketEvents installed.
packetEvents:
  enabled: true
  # SIMPLE rewrites Exort item name/lore packets in VANILLA mode.
  # FULL also rewrites Exort display entity names/item metadata when PacketEvents is available.
  # RESOURCE mode uses resource-pack translation keys instead.
  # SIMPLE | FULL
  localizationLevel: SIMPLE

# Runtime performance controls that may need server-specific tuning.
performance:
  displayCulling:
    # Dynamically lowers Exort display render ranges per player in dense scenes.
    enabled: true
    # AUTO | PACKET_EVENTS | PAPER. AUTO prefers PacketEvents metadata packets when available.
    backend: AUTO
    clientCullingBypass:
      # Stores and applies per-player bypass for clients with a client-side culling mod such as EntityCulling.
      enabled: true
      # Attempts automatic EntityCulling detection with a translation probe for modded clients.
      translationProbe: true
  # Budget Exort marker/display/bus/network post-processing after WorldEdit/FAWE operations.
  worldEditBulk: true
  storage:
    # Seconds between periodic dirty-cache flushes to the database. Set 0 to disable the periodic flush.
    flushIntervalSeconds: 10
    # Seconds before an idle storage cache can be unloaded from memory. Set 0 to disable idle unloads.
    idleUnloadSeconds: 300
    # Seconds between idle-cache checks.
    idleCheckSeconds: 60
  # Ticks between physical terminal/bus GUI distance checks.
  sessionDeviceCheckIntervalTicks: 5
  bus:
    # Global bus operation budget per tick.
    maxOperationsPerTick: 500
    # Per-chunk bus operation budget per tick. Set 0 for no per-chunk limit.
    maxOperationsPerChunk: 40

# Prevent client-side ghost placement and sounds when right-clicking Exort blocks with placeable items.
placementGuard: true

# Region/claim protection integrations.
protection:
  enabled: true
  # If an installed protection adapter cannot complete a check, true denies Exort actions.
  # false keeps fail-open behavior.
  failClosedOnError: false
  adapters:
    worldguard: true
    griefPrevention: true
    towny: true
    lands: true
    residence: true

# Register Exort crafting recipes from recipes.yml.
recipes:
  enabled: true

# Default sort mode for terminals: AMOUNT | NAME | ID | CATEGORY.
defaultSortMode: AMOUNT

# Import/export bus gameplay settings.
bus:
  # Default modes for newly placed buses: DISABLED | WHITELIST | BLACKLIST | ALL.
  defaultMode:
    import: WHITELIST
    export: WHITELIST
  # Allow buses to interact with Exort storages directly.
  allowStorageTargets: true
  # Ticks between bus runs after a successful item move.
  activeIntervalTicks: 5
  # Ticks between bus runs while idle.
  idleIntervalTicks: 40
  # Max items moved per bus operation.
  itemsPerOperation: 1

# Wire traversal limits.
wire:
  # CHORUS_PLANT | BARRIER.
  # CHORUS_PLANT uses chorus carriers when Paper chorus-plant updates are disabled,
  # and safely falls back to BARRIER otherwise. BARRIER always uses full-block wire hitboxes.
  carrier: CHORUS_PLANT
  # Maximum logical wire length used to connect a terminal to storage.
  limit: 32
  # Hard traversal cap. If exceeded, the network is ignored.
  hardCap: 64

# Wireless terminal settings.
wireless:
  enabled: true
  # Range in chunks from the bound storage block, using Manhattan distance.
  rangeChunks: 3

# Custom breaking for Exort carrier blocks.
# Hardness controls break speed; higher is slower.
# Tools only speed breaking up, they do not restrict who can break the block.
break:
  storage:
    hardness: 20.0
    tools:
      - pickaxe
  terminal:
    hardness: 12.0
    tools:
      - pickaxe
      - axe
  monitor:
    hardness: 12.0
    tools:
      - pickaxe
      - axe
  bus:
    hardness: 12.0
    tools:
      - pickaxe
      - axe
  wire:
    hardness: 4.0
    tools:
      - pickaxe
      - axe
      - sword
