name: Exort
version: "${version}"
main: com.zxcmc.exort.core.ExortPlugin
description: "${description}"
api-version: "1.21.7"
authors: ["phantomfighterxx"]
libraries:
  - org.xerial:sqlite-jdbc:3.45.3.0
dependencies:
  server:
    WorldGuard:
      load: BEFORE
      required: false
      join-classpath: true
    WorldEdit:
      load: BEFORE
      required: false
      join-classpath: true
    FastAsyncWorldEdit:
      load: BEFORE
      required: false
      join-classpath: true
    ProtocolLib:
      load: BEFORE
      required: false
      join-classpath: false
    Nexo:
      load: AFTER
      required: false
      join-classpath: false
    ItemsAdder:
      load: AFTER
      required: false
      join-classpath: false
